name: 'Gemini PR Reviewer'
description: 'Automated GitHub PR Review System powered by Google Gemini API'
author: 'PR Reviewer Bot'
branding:
  icon: 'code'
  color: 'blue'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

inputs:
  github_token:
    description: 'GitHub token for API access'
  gemini_api_key:
    description: 'Google Gemini API key'
  max_comments:
    description: 'Maximum number of comments to post'
    default: '10'
  min_severity:
    description: 'Minimum severity level to comment on (critical, high, medium, low, info)'
    default: 'medium'
  owner:
    description: 'Repository owner (auto-detected from environment)'
  repo:
    description: 'Repository name (auto-detected from environment)'
  pr-number:
    description: 'PR number (auto-detected from environment)'

outputs:
  review-summary:
    description: 'Summary of the review performed'
  comments-posted:
    description: 'Number of comments posted'

runs:
  using: 'node20'
  main: 'dist/index.js'
